<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Golden Moments</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

.slider{
    position:relative;
    width:100%;
    height:100vh;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 1s ease;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.slide.active{
    opacity:1;
}

.title{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    color:#fff;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 0 20px black;
    z-index:100;
}

.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:45px;
    color:white;
    cursor:pointer;
    background:rgba(0,0,0,.4);
    padding:15px 20px;
    border-radius:50%;
    user-select:none;
    z-index:100;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

.dots{
    position:absolute;
    bottom:25px;
    width:100%;
    text-align:center;
    z-index:100;
}

.dot{
    display:inline-block;
    width:14px;
    height:14px;
    margin:6px;
    background:white;
    border-radius:50%;
    cursor:pointer;
    opacity:.5;
}

.dot.active{
    opacity:1;
    background:#ff9800;
}

</style>

</head>

<body>

<div class="slider">

<h1 class="title">Golden Moments</h1>

<div class="slide active">
<img src="assets/photo8.jpg">
</div>

<div class="slide">
<img src="assets/photo9.jpg">
</div>

<div class="slide">
<img src="assets/photo10.jpg">
</div>

<div class="prev">&#10094;</div>
<div class="next">&#10095;</div>

<div class="dots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</div>

<script>

let slides=document.querySelectorAll(".slide");
let dots=document.querySelectorAll(".dot");
let current=0;

function showSlide(index){

slides.forEach(slide=>slide.classList.remove("active"));
dots.forEach(dot=>dot.classList.remove("active"));

slides[index].classList.add("active");
dots[index].classList.add("active");

current=index;

}

document.querySelector(".next").onclick=function(){

current++;

if(current>=slides.length){
current=0;
}

showSlide(current);

}

document.querySelector(".prev").onclick=function(){

current--;

if(current<0){
current=slides.length-1;
}

showSlide(current);

}

dots.forEach((dot,index)=>{

dot.onclick=function(){

showSlide(index);

}

});

setInterval(function(){

current++;

if(current>=slides.length){
current=0;
}

showSlide(current);

},4000);

</script>

</body>
</html>
